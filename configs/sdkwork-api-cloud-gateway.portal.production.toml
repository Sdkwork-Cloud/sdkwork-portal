mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "127.0.0.1:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-portal-app-api"
workspace = "sdkwork-portal"
sdkFamily = "sdkwork-portal-app-sdk"
apiAuthority = "sdkwork-portal-app-api"
surface = "app"
apiPrefix = "/app/v3/api/portal"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_PORTAL_APPLICATION_PUBLIC_HTTP_URL"
coverage = "portal-app-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-portal-app-api"
baseUrl = "http://sdkwork-api-portal-standalone-gateway:18091"

[cors]
allowAnyOrigin = false
allowedOrigins = ["https://portal.sdkwork.com"]

[request]
maxBodyBytes = 33554432
timeoutMs = 30000

[readiness]
checkUpstreams = true
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = true
metricsPath = "/metrics"
tracingEnabled = true
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = ["portal.sdkwork.com", "api.sdkwork.com"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[security.waf]
enabled = true
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 1024
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = true
maxAttempts = 2
retryStatuses = [502, 503, 504]
retryBackoffMs = 100
circuitBreakerEnabled = true
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
