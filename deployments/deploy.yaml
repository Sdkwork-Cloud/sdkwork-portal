version: 1
defaultProfile: cloud.split-services.production

profiles:
  cloud.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: portal.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: adaptive
    packages: []

  standalone.unified-process.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: adaptive
    packages: []
